<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>files - minecraft dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .file-actions { display: flex; gap: 0.4rem; margin-left: auto; }
    .file-actions button { font-size: 0.8rem; padding: 0.2rem 0.5rem; }
    .upload-progress {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--fg-muted, #888);
      margin-top: 0.5rem;
    }
    .toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .toolbar input[type="file"] { display: none; }

    .running-banner {
      border: 1px solid #aa5050;
      background: #2a1010;
      color: #ffaaaa;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin: 1rem 0;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .running-banner button { font-size: 0.85rem; }
  </style>
</head>
<body>
  <main id="main"></main>

  <script type="module">
    import { api, renderHeader, renderFooter, el, fmtDate } from '/app.js';

    const params = new URLSearchParams(location.search);
    const name   = params.get('name');
    if (!name) location.href = '/index.html';

    const me = await renderHeader();
    if (!me) throw new Error();
    renderFooter();

    const main = document.getElementById('main');
    main.appendChild(el('h1', {}, 'files'));
    main.appendChild(el('p', { class: 'muted' }, [
      el('a', { href: '/server.html?name=' + encodeURIComponent(name) }, '← back to server'),
      ' · ' + name,
    ]));

    let cwd = '.';
    let serverRunning = false;

    const statusBanner = el('div');
    main.appendChild(statusBanner);

    const breadcrumb = el('p', { class: 'muted mt-2' });
    main.appendChild(breadcrumb);

    const toolbar = el('div', { class: 'toolbar' });
    main.appendChild(toolbar);

    const fileInput = el('input', { type: 'file' });
    const uploadBtn = el('button', { class: 'btn primary', onclick: () => fileInput.click() }, 'upload file');
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) doUpload(fileInput.files[0]);
    });

    const newFolderBtn = el('button', { class: 'btn', onclick: doNewFolder }, 'new folder');

    toolbar.appendChild(uploadBtn);
    toolbar.appendChild(fileInput);
    toolbar.appendChild(newFolderBtn);

    const uploadStatus = el('div', { class: 'upload-progress' });
    main.appendChild(uploadStatus);

    const listEl = el('div', { class: 'list mt-2' });
    main.appendChild(listEl);

    const editor = el('div', { class: 'hidden mt-3' });
    main.appendChild(editor);

    await checkStatus();
    await refresh();

    async function checkStatus() {
      try {
        const r = await api('/api/servers/' + name + '/status');
        serverRunning = r.running;
      } catch { serverRunning = false; }

      statusBanner.innerHTML = '';
      if (serverRunning) {
        statusBanner.appendChild(el('div', { class: 'running-banner' }, [
          el('span', {}, '⚠  the server is running. uploads, edits, renames, and deletes are blocked until you stop it.'),
          el('button', {
            class: 'btn danger',
            onclick: async (e) => {
              if (!confirm('stop ' + name + '?')) return;
              e.target.disabled = true;
              e.target.textContent = 'stopping...';
              try {
                await api('/api/servers/' + name + '/stop', { method: 'POST' });
                await new Promise(r => setTimeout(r, 1500));
                location.reload();
              } catch (err) {
                alert('could not stop server: ' + err.message);
                e.target.disabled = false;
                e.target.textContent = 'stop server';
              }
            },
          }, 'stop server'),
        ]));

        uploadBtn.disabled = true;
        newFolderBtn.disabled = true;
      } else {
        uploadBtn.disabled = false;
        newFolderBtn.disabled = false;
      }
    }

    async function refresh() {
      // Make the breadcrumb clickable to instantly jump back to root
      breadcrumb.innerHTML = '';
      breadcrumb.appendChild(document.createTextNode('path: '));
      const rootLink = el('a', { href: '#', style: 'color: var(--accent); cursor: pointer;' }, 'root');
      rootLink.onclick = (e) => { e.preventDefault(); cwd = '.'; refresh(); };
      breadcrumb.appendChild(rootLink);
      if (cwd !== '.') {
        breadcrumb.appendChild(document.createTextNode(' / ' + cwd));
      }

      listEl.innerHTML = '';
      editor.classList.add('hidden');

      let res;
      try { res = await api('/api/servers/' + name + '/files?path=' + encodeURIComponent(cwd)); }
      catch (err) {
        listEl.appendChild(el('div', { class: 'list-row' }, 'error: ' + err.message));
        return;
      }

      listEl.appendChild(el('div', { class: 'list-row head' }, [
        el('span', { class: 'name' }, 'name'),
        el('span', {}, 'size'),
        el('span', {}, 'modified'),
        el('span', {}, ''),
      ]));

      if (cwd !== '.') {
        listEl.appendChild(el('div', {
          class: 'list-row',
          style: 'cursor:pointer;',
          onclick: () => {
            const parts = cwd.split('/').filter(Boolean);
            parts.pop();
            cwd = parts.length ? parts.join('/') : '.';
            refresh();
          },
        }, [
          el('span', { class: 'name' }, '.. (parent)'),
        ]));
      }

      for (const it of res.items) {
        const fullPath = cwd === '.' ? it.name : cwd + '/' + it.name;

        const nameSpan = el('span', { class: 'name', style: 'cursor:pointer;' },
          (it.type === 'dir' ? '📁 ' : '📄 ') + it.name);
        nameSpan.addEventListener('click', () => {
          if (it.type === 'dir') { cwd = fullPath; refresh(); }
          else if (it.type === 'file') { openFile(fullPath); }
        });

        const actions = el('div', { class: 'file-actions' });

        if (it.type === 'file') {
          actions.appendChild(el('a', {
            class: 'btn',
            href: '/api/servers/' + encodeURIComponent(name) + '/file/download?path=' + encodeURIComponent(fullPath),
          }, 'download'));
        }

        const renameBtn = el('button', {
          class: 'btn',
          onclick: (e) => { e.stopPropagation(); doRename(it.name, fullPath); },
        }, 'rename');
        const deleteBtn = el('button', {
          class: 'btn danger',
          onclick: (e) => { e.stopPropagation(); doDelete(it.name, fullPath, it.type); },
        }, 'delete');
        renameBtn.disabled = serverRunning;
        deleteBtn.disabled = serverRunning;
        actions.appendChild(renameBtn);
        actions.appendChild(deleteBtn);

        const row = el('div', { class: 'list-row' }, [
          nameSpan,
          el('span', { class: 'muted' }, it.type === 'file' ? formatSize(it.size) : ''),
          el('span', { class: 'muted' }, fmtDate(it.mtime)),
          actions,
        ]);
        listEl.appendChild(row);
      }
    }

    async function doUpload(file) {
      if (serverRunning) {
        uploadStatus.textContent = 'stop the server first.';
        return;
      }

      uploadStatus.textContent = 'uploading ' + file.name + ' (' + formatSize(file.size) + ')...';
      uploadBtn.disabled = true;

      const fd = new FormData();
      fd.append('file', file);

      try {
        const r = await fetch('/api/servers/' + encodeURIComponent(name) + '/upload?path=' + encodeURIComponent(cwd), {
          method: 'POST',
          body: fd,
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'upload failed');
        uploadStatus.textContent = 'uploaded ' + data.filename + ' (' + formatSize(data.bytes) + ')';
        setTimeout(() => { uploadStatus.textContent = ''; }, 3000);
        fileInput.value = '';
        await refresh();
      } catch (err) {
        uploadStatus.textContent = 'error: ' + err.message;
      } finally {
        uploadBtn.disabled = serverRunning;
      }
    }

    async function doNewFolder() {
      const folderName = prompt('new folder name:');
      if (!folderName) return;
      try {
        await api('/api/servers/' + name + '/mkdir', {
          method: 'POST',
          body: { path: cwd, name: folderName },
        });
        await refresh();
      } catch (err) {
        alert('could not create folder: ' + err.message);
      }
    }

    async function doRename(oldName, fullPath) {
      const newName = prompt('rename "' + oldName + '" to:', oldName);
      if (!newName || newName === oldName) return;
      try {
        await api('/api/servers/' + name + '/rename', {
          method: 'POST',
          body: { from: fullPath, to: newName },
        });
        await refresh();
      } catch (err) {
        alert('could not rename: ' + err.message);
      }
    }

    async function doDelete(displayName, fullPath, type) {
      const what = type === 'dir' ? 'folder (and all its contents)' : 'file';
      if (!confirm('delete ' + what + ' "' + displayName + '"? this cannot be undone.')) return;
      try {
        await api('/api/servers/' + name + '/entry?path=' + encodeURIComponent(fullPath), {
          method: 'DELETE',
        });
        await refresh();
      } catch (err) {
        alert('could not delete: ' + err.message);
      }
    }

    async function openFile(path) {
      let res;
      try { res = await api('/api/servers/' + name + '/file?path=' + encodeURIComponent(path)); }
      catch (err) { alert(err.message); return; }

      editor.innerHTML = '';
      editor.classList.remove('hidden');
      editor.appendChild(el('h2', {}, 'editing ' + path));
      if (serverRunning) {
        editor.appendChild(el('p', { class: 'muted' }, 'view-only — stop the server to enable saving.'));
      }

      const ta = el('textarea', {}, res.content);
      ta.style.width = '100%';
      ta.style.minHeight = '400px';
      ta.style.fontFamily = 'inherit';
      ta.style.fontSize = '0.85rem';
      ta.style.background = '#050505';
      ta.style.color = 'var(--norm)';
      ta.style.border = '1px solid var(--border)';
      ta.style.padding = '0.6rem';
      editor.appendChild(ta);

      const status = el('p', { class: 'form-status' });
      const saveBtn = el('button', {
        class: 'btn primary',
        onclick: async (e) => {
          e.target.disabled = true;
          try {
            await api('/api/servers/' + name + '/file', {
              method: 'PUT',
              body: { path, content: ta.value },
            });
            status.textContent = 'saved.';
            status.className = 'form-status success';
          } catch (err) {
            status.textContent = err.message;
            status.className = 'form-status error';
          } finally { e.target.disabled = false; }
        },
      }, 'save');
      saveBtn.disabled = serverRunning;

      editor.appendChild(el('div', { class: 'row mt-1' }, [
        saveBtn,
        el('button', {
          class: 'btn',
          onclick: () => { editor.classList.add('hidden'); },
        }, 'cancel'),
        status,
      ]));
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }
  </script>
</body>
</html>
