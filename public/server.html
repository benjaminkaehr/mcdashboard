<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>server - minecraft dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    main {
      max-width: 1200px !important; /* Increases width from the default 960px */
    }

    .collapsible-header {
      display: flex; align-items: center; gap: 0.5rem;
      cursor: pointer; user-select: none;
    }
    .collapsible-header h2 { margin: 0; }
    .collapse-arrow {
      font-size: 0.75rem;
      color: var(--fg-muted, #888);
      transition: transform 0.2s;
    }
    .collapsible-header.collapsed .collapse-arrow { transform: rotate(-90deg); }
    .collapsible-body.collapsed { display: none; }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .player-card {
      border: 1px solid var(--border, #333);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .player-name { font-weight: bold; font-size: 1rem; }
    .player-detail { font-size: 0.85rem; color: var(--fg-muted, #888); font-family: monospace; white-space: pre; }
    .mc-bar { display: flex; gap: 2px; margin-top: 0.3rem; align-items: center; }
    .mc-pip { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .mc-pip.full  { opacity: 1; }
    .mc-pip.half  { opacity: 1; position: relative; overflow: hidden; background: transparent !important; }
    .mc-pip.empty { opacity: 0.18; }

    .running-warn {
      border: 1px solid #aa5050;
      background: #2a1010;
      color: #ffaaaa;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin: 0.5rem 0;
      font-size: 0.85rem;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* Increased for wider charts */
      gap: 1rem;
      margin-top: 0.75rem;
    }
    .chart-panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.02);
      padding: 1rem;
    }
    .chart-panel h3 {
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .chart-panel canvas {
      width: 100%;
      height: 250px;
      background: #050505;
      border: 1px solid var(--border);
      display: block;
    }
    .metrics-summary {
      margin-top: 0.75rem;
      font-family: monospace;
      color: var(--muted);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main id="main"></main>

  <script type="module">
    import { api, renderHeader, renderFooter, el } from '/app.js';

    const params = new URLSearchParams(location.search);
    const name   = params.get('name');
    if (!name) location.href = '/index.html';

    const me = await renderHeader();
    if (!me) throw new Error();
    renderFooter();

    const main = document.getElementById('main');

    const { servers } = await api('/api/servers');
    const server = servers.find(s => s.name === name);
    if (!server) {
      main.appendChild(el('h1', {}, 'no access'));
      main.appendChild(el('p', { class: 'muted' }, 'you do not have permission to view this server.'));
      throw new Error();
    }

    const isOperator = me.is_super || server.role === 'operator';

    main.appendChild(el('h1', {}, server.display_name || server.name));
    main.appendChild(el('p', { class: 'muted' }, [
      el('span', { class: 'dot' + (server.running ? '' : ' offline'), style: 'margin-right:0.5rem;' }),
      server.running ? 'running' : 'stopped',
      '   ·   role: ' + server.role,
    ]));

    const power = el('div', { class: 'row mt-2' }, []);
    if (!server.running) {
      power.appendChild(button('start', 'btn primary', '/api/servers/' + name + '/start'));
    } else if (isOperator) {
      power.appendChild(button('stop',    'btn danger', '/api/servers/' + name + '/stop'));
      power.appendChild(button('restart', 'btn warn',   '/api/servers/' + name + '/restart'));
    }
    main.appendChild(power);

    const connBox = el('div', { class: 'mt-2', style: 'padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: rgba(255,255,255,0.02);' });
    connBox.appendChild(el('div', { class: 'muted', style: 'font-size: 0.8rem; margin-bottom: 0.25rem;' }, 'connect from minecraft:'));
    const connAddr = el('div', { style: 'font-family: monospace; font-size: 1.1rem; user-select: all; cursor: text;' }, 'loading...');
    connBox.appendChild(connAddr);
    main.appendChild(connBox);

    (async () => {
      try {
        const conn = await api('/api/servers/' + encodeURIComponent(name) + '/connection');
        connAddr.textContent = conn.local_ip + ':' + conn.port;
      } catch (err) {
        connAddr.textContent = 'could not load';
      }
    })();

    const metricsBody = collapsible('metrics', false);
    metricsBody.appendChild(el('p', { class: 'muted' }, 'server resource usage and uptime. updates every 15 seconds.'));
    const metricsStatus = el('div', { class: 'muted' }, 'loading metrics...');
    const metricsSummary = el('div', { class: 'metrics-summary' }, '');
    const cpuCanvas = el('canvas', { width: '600', height: '250' });
    const memCanvas = el('canvas', { width: '600', height: '250' });
    const diskCanvas = el('canvas', { width: '600', height: '250' });
    metricsBody.appendChild(metricsStatus);
    metricsBody.appendChild(el('div', { class: 'chart-grid' }, [
      el('div', { class: 'chart-panel' }, [el('h3', {}, 'CPU usage'), cpuCanvas]),
      el('div', { class: 'chart-panel' }, [el('h3', {}, 'Memory usage'), memCanvas]),
      el('div', { class: 'chart-panel' }, [el('h3', {}, 'Disk usage'), diskCanvas]),
    ]));
    metricsBody.appendChild(metricsSummary);

    function drawLineChart(canvas, values, color, unit, fixedMax) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const width = canvas.clientWidth * dpr;
      const height = canvas.clientHeight * dpr;
      canvas.width = width;
      canvas.height = height;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      
      const points = values.map(v => (v == null ? null : Number(v)));
      const valid = points.filter(v => v != null && Number.isFinite(v));
      
      if (!valid.length) {
        ctx.fillStyle = '#e8e8e8'; // Bright text
        ctx.font = '12px ' + (window.getComputedStyle(canvas).fontFamily || 'monospace');
        ctx.fillText('no metrics available yet', 12, h / 2);
        return;
      }
      
      let min = 0; // Bottom is ALWAYS 0
      let dataMax = Math.max(...valid, 0.1); 
      let max = fixedMax;
      
      // If no fixedMax is provided, calculate a proper "nice number" max for smooth chart scaling
      if (!max) {
        const roughStep = dataMax / 4;
        const magnitude = Math.pow(10, Math.floor(Math.log10(roughStep)));
        const normalizedStep = roughStep / magnitude;
        
        let niceStep;
        if (normalizedStep <= 1) niceStep = 1;
        else if (normalizedStep <= 2) niceStep = 2;
        else if (normalizedStep <= 2.5) niceStep = 2.5;
        else if (normalizedStep <= 5) niceStep = 5;
        else niceStep = 10;
        
        const step = niceStep * magnitude;
        max = step * 4;
      }

      const padding = 20;
      const rightSpace = 55; // Space on the right for labels

      // Draw grid lines and labels
      ctx.fillStyle = '#e8e8e8'; // Bright white text so you can read it
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; // faint grid lines
      ctx.lineWidth = 1;
      ctx.font = '12px ' + (window.getComputedStyle(canvas).fontFamily || 'monospace');
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';

      const gridLines = 5; // 0%, 25%, 50%, 75%, 100% marks
      for (let i = 0; i < gridLines; i++) {
        const fraction = i / (gridLines - 1);
        const val = min + (max - min) * fraction;
        const y = h - padding - fraction * (h - padding * 2);
        
        // Draw the horizontal grid line
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(w - rightSpace, y);
        ctx.stroke();

        // Draw the text label cleanly (drops unnecessary zeroes automatically)
        let label = Number(val.toFixed(2)).toString();
        ctx.fillText(label + unit, w - 8, y);
      }

      // Draw the data line
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      let first = true;
      for (let i = 0; i < points.length; i++) {
        const value = points[i];
        const x = padding + (i / Math.max(1, points.length - 1)) * (w - padding - rightSpace);
        if (value == null) {
          first = true;
          continue;
        }
        const y = h - padding - ((value - min) / (max - min)) * (h - padding * 2);
        if (first) {
          ctx.moveTo(x, y);
          first = false;
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      // Draw the data points
      ctx.fillStyle = color;
      for (let i = 0; i < points.length; i++) {
        const value = points[i];
        if (value == null) continue;
        const x = padding + (i / Math.max(1, points.length - 1)) * (w - padding - rightSpace);
        const y = h - padding - ((value - min) / (max - min)) * (h - padding * 2);
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function formatBytes(bytes) {
      if (bytes == null) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    function formatDuration(seconds) {
      if (seconds == null) return '—';
      const s = Math.max(0, Math.floor(seconds));
      const days = Math.floor(s / 86400);
      const hours = Math.floor((s % 86400) / 3600);
      const mins = Math.floor((s % 3600) / 60);
      const secs = s % 60;
      const parts = [];
      if (days) parts.push(days + 'd');
      if (hours) parts.push(hours + 'h');
      if (mins) parts.push(mins + 'm');
      parts.push(secs + 's');
      return parts.join(' ');
    }

    async function loadMetrics() {
      try {
        const [metrics, uptime] = await Promise.all([
          api('/api/servers/' + encodeURIComponent(name) + '/metrics'),
          api('/api/servers/' + encodeURIComponent(name) + '/uptime'),
        ]);
        
        const last = points[points.length - 1] || {};

        metricsStatus.textContent = '';
        const points = metrics.metrics || [];
        // Check for health alerts based on your monitor.js logic
        const isHighCpu = last.cpu > 90;
        // Assuming 4G limit as used in your monitor.js helper
        const isHighMem = last.memory > (4 * 1024 * 1024 * 1024 * 0.95); 

        if (isHighCpu || isHighMem) {
          const reason = isHighCpu ? 'High CPU' : 'High RAM Usage';
          metricsStatus.innerHTML = `
            <div class="running-banner" style="border-color: #aa5050; background: #2a1010; color: #ffaaaa; margin-bottom: 1rem;">
              ⚠ <strong>Health Alert:</strong> ${reason} detected. Server performance may be impacted.
            </div>`;
        }
        
    // ... keep the rest of your chart drawing code ...
        // CPU passes '100' at the end to lock the maximum scale to 100%
        drawLineChart(cpuCanvas, points.map(p => p.cpu), '#4caf50', '%', 100);
        
        // Memory is changed to GB (divided by 1024 three times)
        drawLineChart(memCanvas, points.map(p => p.memory ? p.memory / 1024 / 1024 / 1024 : null), '#42a5f5', ' GB');
        
        // Disk stays the same
        drawLineChart(diskCanvas, points.map(p => p.disk ? p.disk / 1024 / 1024 / 1024 : null), '#f4b400', ' GB');

        const currentCpu = last.cpu != null ? last.cpu.toFixed(1) + '%' : '—';
        const currentMem = last.memory != null ? formatBytes(last.memory) : '—';
        const currentDisk = last.disk != null ? formatBytes(last.disk) : '—';
        const uptimeText = uptime.running
          ? 'running for ' + formatDuration(uptime.current_run_seconds)
          : 'stopped';
        const lastRunText = uptime.last_run_seconds != null ? formatDuration(uptime.last_run_seconds) : '—';
        const total30dText = formatDuration(uptime.total_uptime_last_30_days_seconds);
        metricsSummary.textContent =
          'current CPU: ' + currentCpu + '\n' +
          'current memory: ' + currentMem + '\n' +
          'current disk: ' + currentDisk + '\n' +
          'uptime: ' + uptimeText + '\n' +
          'last run: ' + lastRunText + '\n' +
          'last 30d total: ' + total30dText;
      } catch (err) {
        metricsStatus.textContent = 'error loading metrics: ' + err.message;
      }
    }

    loadMetrics();
    setInterval(loadMetrics, 15000);

    function button(label, cls, url) {
      return el('button', {
        class: cls,
        onclick: async (e) => {
          if (label !== 'start' && !confirm(label + ' ' + name + '?')) return;
          e.target.disabled = true;
          e.target.textContent = label + '...';
          try {
            await api(url, { method: 'POST' });
            location.reload();
          } catch (err) {
            alert(err.message);
            e.target.disabled = false;
            e.target.textContent = label;
          }
        },
      }, label);
    }

    function collapsible(title, startCollapsed = false) {
      const arrow  = el('span', { class: 'collapse-arrow' }, '▼');
      const header = el('div', { class: 'collapsible-header' + (startCollapsed ? ' collapsed' : '') }, [
        el('h2', {}, title), arrow,
      ]);
      const body = el('div', { class: 'collapsible-body' + (startCollapsed ? ' collapsed' : '') });
      header.addEventListener('click', () => {
        const c = header.classList.toggle('collapsed');
        body.classList.toggle('collapsed', c);
      });
      main.appendChild(el('div', { class: 'mt-2' }, [header, body]));
      return body;
    }

    if (isOperator) {

      /* ---- whitelist ---- */
      const wlBody  = collapsible('whitelist', true);
      const wlInput = el('input', { type: 'text', placeholder: 'minecraft username' });
      const wlOut   = el('div', { class: 'console' });
      wlBody.appendChild(el('div', { class: 'row' }, [
        wlInput,
        el('button', { class: 'btn primary', onclick: () => doWl('add') }, 'add'),
        el('button', { class: 'btn danger',  onclick: () => doWl('remove') }, 'remove'),
        el('button', { class: 'btn', onclick: async () => {
          try {
            const r = await api('/api/servers/' + name + '/whitelist');
            wlOut.textContent = r.result || '(empty)';
          } catch (err) { wlOut.textContent = 'error: ' + err.message; }
        }}, 'list'),
      ]));
      wlBody.appendChild(wlOut);

      async function doWl(action) {
        const username = wlInput.value.trim();
        if (!username) return;
        try {
          const r = await api('/api/servers/' + name + '/whitelist/' + action, {
            method: 'POST', body: { username },
          });
          wlOut.textContent = r.result || '(no output)';
          wlInput.value = '';
        } catch (err) { wlOut.textContent = 'error: ' + err.message; }
      }

      /* ---- console ---- */
      const conBody  = collapsible('console', true);
      conBody.appendChild(el('p', { class: 'muted' }, 'sends a command via RCON. server must be running.'));
      const cmdInput = el('input', { type: 'text', placeholder: 'e.g. say hello' });
      const cmdOut   = el('div', { class: 'console' });
      cmdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCmd(); });
      conBody.appendChild(el('div', { class: 'row' }, [
        cmdInput,
        el('button', { class: 'btn primary', onclick: sendCmd }, 'send'),
      ]));
      conBody.appendChild(cmdOut);

      async function sendCmd() {
        const command = cmdInput.value.trim();
        if (!command) return;
        try {
          const r = await api('/api/servers/' + name + '/console', {
            method: 'POST', body: { command },
          });
          cmdOut.textContent = '> ' + command + '\n' + (r.result || '') + '\n\n' + cmdOut.textContent;
          cmdInput.value = '';
        } catch (err) { cmdOut.textContent = 'error: ' + err.message + '\n\n' + cmdOut.textContent; }
      }

      /* ---- online players ---- */
      const plBody    = collapsible('online players', false);
      const plStatus  = el('p', { class: 'muted' }, server.running ? 'loading...' : 'server is offline.');
      const plGrid    = el('div', { class: 'player-grid' });
      const plRefresh = el('button', { class: 'btn primary', onclick: () => loadPlayers() }, 'refresh');
      plBody.appendChild(el('div', { class: 'row' }, [plRefresh]));
      plBody.appendChild(plStatus);
      plBody.appendChild(plGrid);

      async function rcon(command) {
        const r = await api('/api/servers/' + name + '/console', {
          method: 'POST', body: { command },
        });
        return r.result || '';
      }

      async function loadPlayers() {
        plRefresh.disabled = true;
        plRefresh.textContent = 'loading...';
        plGrid.innerHTML = '';
        plStatus.textContent = '';
        try {
          const listResult = await rcon('list');
          const match = listResult.match(/:\s*(.+)$/);
          const names = match && match[1].trim()
            ? match[1].split(',').map(n => n.trim()).filter(Boolean)
            : [];

          if (names.length === 0) {
            plStatus.textContent = 'no players online.';
            return;
          }
          plStatus.textContent = names.length + ' player' + (names.length !== 1 ? 's' : '') + ' online';

          for (const pname of names) {
            const card   = el('div', { class: 'player-card' });
            const detail = el('div', { class: 'player-detail' }, 'fetching...');
            card.appendChild(el('div', { class: 'player-name' }, pname));
            card.appendChild(detail);
            plGrid.appendChild(card);

            try {
              const [posRaw, hpRaw, foodRaw, dimRaw] = await Promise.all([
                rcon('data get entity ' + pname + ' Pos'),
                rcon('data get entity ' + pname + ' Health'),
                rcon('data get entity ' + pname + ' foodLevel'),
                rcon('data get entity ' + pname + ' Dimension'),
              ]);

              const posMatch  = posRaw.match(/\[([-\d.]+)d,\s*([-\d.]+)d,\s*([-\d.]+)d\]/);
              const pos = posMatch
                ? 'x ' + Math.round(posMatch[1]) + '  y ' + Math.round(posMatch[2]) + '  z ' + Math.round(posMatch[3])
                : '—';

              const hpMatch  = hpRaw.match(/([\d.]+)f$/);
              const hp       = hpMatch ? parseFloat(hpMatch[1]) : null;

              const foodMatch = foodRaw.match(/(\d+)$/);
              const food      = foodMatch ? parseInt(foodMatch[1]) : null;

              const dimMatch = dimRaw.match(/"([^"]+)"$/);
              const dim      = dimMatch ? dimMatch[1].replace('minecraft:', '').replace(/_/g, ' ') : '—';

              detail.textContent = 'pos:    ' + pos + '\nworld:  ' + dim;

              function makePip(state, color) {
                const pip = el('div', { class: 'mc-pip ' + state });
                pip.style.background = color;
                if (state === 'half') {
                  pip.style.background = 'transparent';
                  pip.style.border = '1px solid ' + color;
                  const half = el('div', {});
                  half.style.cssText = 'position:absolute;left:0;top:0;width:50%;height:100%;background:' + color;
                  pip.appendChild(half);
                }
                return pip;
              }
              function makeBar(value, color) {
                const bar = el('div', { class: 'mc-bar' });
                for (let i = 0; i < 10; i++) {
                  const t = (i + 1) * 2;
                  let s;
                  if (value >= t)        s = 'full';
                  else if (value >= t-1) s = 'half';
                  else                   s = 'empty';
                  bar.appendChild(makePip(s, color));
                }
                return bar;
              }

              if (hp !== null) {
                card.appendChild(el('div', { class: 'player-detail' }, 'health: ' + hp.toFixed(1) + ' / 20'));
                card.appendChild(makeBar(hp, '#e05252'));
              }
              if (food !== null) {
                card.appendChild(el('div', { class: 'player-detail' }, 'food:   ' + food + ' / 20'));
                card.appendChild(makeBar(food, '#c8a030'));
              }
            } catch {
              detail.textContent = 'could not fetch details';
            }
          }
        } catch (err) {
          plStatus.textContent = 'error: ' + err.message;
        } finally {
          plRefresh.disabled = false;
          plRefresh.textContent = 'refresh';
        }
      }

      if (server.running) loadPlayers();

      /* ---- auto-stop ---- */
      const asBody = collapsible('auto-stop', true);
      asBody.appendChild(el('p', { class: 'muted' },
        'automatically stop the server when no players are online for the chosen duration. checked once per minute.'));
      const asSelect = el('select', {}, [
        el('option', { value: '0'   }, 'off (never auto-stop)'),
        el('option', { value: '5'   }, '5 minutes'),
        el('option', { value: '15'  }, '15 minutes'),
        el('option', { value: '30'  }, '30 minutes'),
        el('option', { value: '60'  }, '1 hour'),
        el('option', { value: '120' }, '2 hours'),
      ]);
      const asStatus = el('span', { class: 'muted' }, 'loading...');
      asBody.appendChild(el('div', { class: 'row' }, [asSelect, asStatus]));
      const asLive = el('p', { class: 'muted', style: 'margin-top:0.75rem;font-family:monospace;' }, '—');
      asBody.appendChild(asLive);

      try {
        const r = await api('/api/servers/' + name + '/auto-stop');
        asSelect.value = String(r.minutes);
        asStatus.textContent = '';
      } catch (err) { asStatus.textContent = 'error: ' + err.message; }

      asSelect.addEventListener('change', async () => {
        const minutes = parseInt(asSelect.value, 10);
        const previous = asSelect.dataset.previous || '0';
        asStatus.textContent = 'saving...';
        try {
          await api('/api/servers/' + name + '/auto-stop', { method: 'PUT', body: { minutes } });
          asSelect.dataset.previous = String(minutes);
          asStatus.textContent = 'saved.';
          setTimeout(() => { asStatus.textContent = ''; }, 1500);
          loadAutoStopStatus();
        } catch (err) {
          asSelect.value = previous;
          asStatus.textContent = 'error: ' + err.message;
        }
      });
      asSelect.dataset.previous = asSelect.value;

      function fmtSeconds(s) {
        if (s == null) return '—';
        const m = Math.floor(s / 60);
        const ss = s % 60;
        if (m === 0) return ss + 's';
        return m + 'm ' + ss + 's';
      }

      async function loadAutoStopStatus() {
        try {
          const r = await api('/api/servers/' + name + '/auto-stop/status');
          if (!r.running)              asLive.textContent = 'server is offline.';
          else if (r.minutes === 0)    asLive.textContent = 'auto-stop is off.';
          else if (r.players === null) asLive.textContent = 'rcon not responding — cannot determine player count.';
          else if (r.players > 0)      asLive.textContent = r.players + ' player' + (r.players !== 1 ? 's' : '') + ' online — server will not auto-stop.';
          else if (r.stops_in_seconds !== null) asLive.textContent = 'no players online — server stops in ' + fmtSeconds(r.stops_in_seconds) + '.';
          else                         asLive.textContent = 'no players online — timer will start at next check.';
        } catch (err) { asLive.textContent = 'status error: ' + err.message; }
      }
      loadAutoStopStatus();
      const asInterval = setInterval(loadAutoStopStatus, 10000);
      window.addEventListener('beforeunload', () => clearInterval(asInterval));

      /* ---- world download/upload ---- */
      const wBody = collapsible('world', true);
      wBody.appendChild(el('p', { class: 'muted' },
        'download or replace world folders as a zip file. uploads require the server to be stopped.'));

      const wRunningWarn = el('div', { class: 'running-warn' + (server.running ? '' : ' hidden') },
        '⚠  the server is running. uploads are disabled until you stop it.');
      wBody.appendChild(wRunningWarn);

      const wFolderSelect = el('select', {});
      const wRefreshFolders = el('button', { class: 'btn', onclick: () => loadFolders() }, 'refresh list');
      const wDownload = el('a', { class: 'btn primary', href: '#' }, 'download zip');
      const wUploadBtn = el('button', { class: 'btn warn' }, 'upload zip (replaces folder)');
      const wFileInput = el('input', { type: 'file', accept: '.zip', style: 'display:none;' });
      wUploadBtn.addEventListener('click', () => wFileInput.click());
      wFileInput.addEventListener('change', () => {
        if (wFileInput.files[0]) doWorldUpload(wFileInput.files[0]);
      });
      const wStatus = el('div', { style: 'margin-top:0.5rem;font-family:monospace;font-size:0.85rem;color:var(--fg-muted,#888);' });

      wBody.appendChild(el('div', { class: 'row' }, [
        el('label', { class: 'muted' }, 'folder:'),
        wFolderSelect,
        wRefreshFolders,
        wDownload,
        wUploadBtn,
        wFileInput,
      ]));
      wBody.appendChild(wStatus);

      function updateDownloadHref() {
        const folder = wFolderSelect.value;
        wDownload.href = '/api/servers/' + encodeURIComponent(name) + '/world/download?folder=' + encodeURIComponent(folder);
      }
      wFolderSelect.addEventListener('change', updateDownloadHref);

      async function loadFolders() {
        wFolderSelect.innerHTML = '';
        wStatus.textContent = '';
        try {
          const r = await api('/api/servers/' + name + '/world/folders');
          if (r.folders.length === 0) {
            wFolderSelect.appendChild(el('option', { value: '' }, '(no world folders found)'));
            wDownload.style.pointerEvents = 'none';
            wDownload.style.opacity = '0.5';
          } else {
            for (const f of r.folders) {
              wFolderSelect.appendChild(el('option', { value: f }, f));
            }
            wDownload.style.pointerEvents = '';
            wDownload.style.opacity = '';
            updateDownloadHref();
          }
        } catch (err) {
          wStatus.textContent = 'error loading folders: ' + err.message;
        }
        wUploadBtn.disabled = server.running;
      }
      loadFolders();

      async function doWorldUpload(file) {
        const folder = wFolderSelect.value;
        if (!folder) {
          wStatus.textContent = 'pick a folder first.';
          return;
        }
        if (!file.name.toLowerCase().endsWith('.zip')) {
          wStatus.textContent = 'must be a .zip file.';
          return;
        }
        if (!confirm(
          'this will DELETE the existing "' + folder + '" folder and replace it with the contents of "' + file.name + '".\n\n' +
          'this cannot be undone. continue?'
        )) return;

        wStatus.textContent = 'uploading and extracting ' + file.name + ' (' + formatSize(file.size) + ')... this can take a while.';
        wUploadBtn.disabled = true;

        const fd = new FormData();
        fd.append('file', file);

        try {
          const r = await fetch('/api/servers/' + encodeURIComponent(name) + '/world/upload?folder=' + encodeURIComponent(folder), {
            method: 'POST',
            body: fd,
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || 'upload failed');
          wStatus.textContent = 'replaced "' + folder + '" with ' + data.entries + ' entries (' + formatSize(data.bytes) + ').';
          wFileInput.value = '';
          loadFolders();
        } catch (err) {
          wStatus.textContent = 'error: ' + err.message;
        } finally {
          wUploadBtn.disabled = server.running;
        }
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
      }

      /* ---- game log ---- */
      const glBody    = collapsible('game log', true);
      glBody.appendChild(el('p', { class: 'muted' },
        'in-game events from minecraft. pick a log file to view its full contents. ' +
        '"latest.log" is the current server run — older runs are stored as compressed .gz files.'));

      const glSelect    = el('select', {});
      const glRefreshList = el('button', { class: 'btn', onclick: () => loadLogList() }, 'refresh list');
      const glRefresh   = el('button', { class: 'btn primary', onclick: () => loadGameLog() }, 'load');
      const glDownloadAll = el('a', {
        class: 'btn',
        href: '/api/servers/' + encodeURIComponent(name) + '/game-log/download-all',
      }, 'download all logs (zip)');
      const glOut = el('pre', { class: 'console', style: 'max-height: 500px;' }, 'pick a log and click load.');

      glBody.appendChild(el('div', { class: 'row' }, [
        el('label', { class: 'muted' }, 'log file:'),
        glSelect,
        glRefreshList,
        glRefresh,
        glDownloadAll,
      ]));
      glBody.appendChild(glOut);

      glSelect.addEventListener('change', () => loadGameLog());

      async function loadLogList() {
        glSelect.innerHTML = '';
        try {
          const r = await api('/api/servers/' + name + '/game-log/files');
          if (r.files.length === 0) {
            glSelect.appendChild(el('option', { value: '' }, '(no log files yet)'));
            glOut.textContent = '(no log files yet)';
            return;
          }
          for (const f of r.files) {
            const label = f.name + '  (' + formatSize(f.size) + (f.gzipped ? ', compressed' : '') + ')';
            glSelect.appendChild(el('option', { value: f.name }, label));
          }
          /* default to latest.log if present, otherwise the first */
          glSelect.value = r.files[0].name;
          loadGameLog();
        } catch (err) {
          glOut.textContent = 'error listing logs: ' + err.message;
        }
      }

      async function loadGameLog() {
        const file = glSelect.value;
        if (!file) return;
        glRefresh.disabled = true;
        glRefresh.textContent = 'loading...';
        glOut.textContent = 'loading ' + file + '...';
        try {
          const r = await api('/api/servers/' + name + '/game-log/file?name=' + encodeURIComponent(file));
          glOut.textContent = r.content || '(empty)';
          glOut.scrollTop = glOut.scrollHeight;
        } catch (err) {
          glOut.textContent = 'error: ' + err.message;
        } finally {
          glRefresh.disabled = false;
          glRefresh.textContent = 'load';
        }
      }
      loadLogList();

      /* ---- system log ---- */
      const slBody     = collapsible('system log', true);
      slBody.appendChild(el('p', { class: 'muted' }, 'recent output from journalctl. last 200 lines of the systemd unit log.'));
      const slOut      = el('pre', { class: 'console', style: 'max-height: 400px;' }, 'loading...');
      const slRefresh  = el('button', { class: 'btn primary', onclick: () => loadSysLog() }, 'refresh');
      
      const slAutoLabel = el('label', { class: 'muted row', style: 'cursor:pointer;' }, [
        el('input', { type: 'checkbox', id: 'auto-log' }), ' auto-refresh'
      ]);

      const slDownload = el('a', {
        class: 'btn',
        href: '/api/servers/' + encodeURIComponent(name) + '/logs/download',
      }, 'download full log');
      
      slBody.appendChild(el('div', { class: 'row', style: 'justify-content: space-between; width: 100%;' }, [
        el('div', { class: 'row' }, [slRefresh, slDownload]),
        slAutoLabel
      ]));
      slBody.appendChild(slOut);

      async function loadSysLog() {
        slRefresh.disabled = true;
        slRefresh.textContent = 'loading...';
        try {
          const r = await api('/api/servers/' + name + '/logs?lines=200');
          // Only update and scroll if the text actually changed
          if (slOut.textContent !== r.text) {
            slOut.textContent = r.text || '(no log entries)';
            slOut.scrollTop = slOut.scrollHeight;
          }
        } catch (err) {
          slOut.textContent = 'error: ' + err.message;
        } finally {
          slRefresh.disabled = false;
          slRefresh.textContent = 'refresh';
        }
      }
      
      loadSysLog();
      
      // Auto-refresh logic
      setInterval(() => {
        if (document.getElementById('auto-log')?.checked) {
          loadSysLog();
        }
      }, 3000);

      /* ---- files ---- */
      const fiBody = collapsible('files', true);
      fiBody.appendChild(el('p', { class: 'muted' }, 'browse and edit text files inside the server folder.'));
      fiBody.appendChild(el('p', {}, el('a', { href: '/files.html?name=' + encodeURIComponent(name) }, 'open file browser →')));
    }
    if (me.is_super) {
        /* ---- danger zone: remove server ---- */
        const dzBody = collapsible('danger zone', true);

        dzBody.appendChild(el('p', { class: 'muted', style: 'color: #c84040;' },
          'remove this server from the dashboard. this stops the server, deletes its systemd unit, removes the entry from servers.json, and removes its RCON password from .env. world files are kept by default — check the box if you also want to delete them (this is permanent).'
        ));

        const deleteFilesCheckbox = el('input', { type: 'checkbox', id: 'rm-delete-files' });
        const dfLabel = el('label', { class: 'row', style: 'gap: 0.4rem; margin: 0.5rem 0;' }, [
          deleteFilesCheckbox,
          el('span', { style: 'color: #c84040;' }, 'also delete server folder (worlds, jar, config) — PERMANENT'),
        ]);
        dzBody.appendChild(dfLabel);

        const removeBtn = el('button', { class: 'btn danger', onclick: async () => {
          const deleteFiles = deleteFilesCheckbox.checked;

          /* step 1: are you sure */
          const warning = deleteFiles
            ? `Remove "${name}" AND DELETE ALL ITS FILES?\n\nThis is permanent. The world data will be gone forever.`
            : `Remove "${name}" from the dashboard?\n\nThe server folder at ${server.folder || '/srv/mcserv/' + name} will be kept — you can re-add it later.`;
          if (!confirm(warning)) return;

          /* step 2: type the name to confirm */
          const typed = prompt(`To confirm, type the server name exactly:\n\n${name}`);
          if (typed !== name) {
            if (typed !== null) alert(`Did not match. Got "${typed}", expected "${name}". Aborted.`);
            return;
          }

          /* fire it */
          removeBtn.disabled = true;
          removeBtn.textContent = 'removing...';
          try {
            const res = await api('/api/servers/' + encodeURIComponent(name), {
              method: 'DELETE',
              body: { confirmName: name, deleteFiles },
            });

            const summary =
              'Removed:\n' +
              '  systemd unit: ' + (res.unit_removed ? 'yes' : 'no') + '\n' +
              '  servers.json: ' + (res.json_removed ? 'yes' : 'no') + '\n' +
              '  .env entry:   ' + (res.env_removed ? 'yes' : 'no') + '\n' +
              '  folder:       ' + (res.folder_deleted ? 'yes (gone)' : 'no (kept)');
            alert(summary + '\n\nReturning to server list.');
            location.href = '/index.html';
          } catch (err) {
            alert('removal failed: ' + err.message);
            removeBtn.disabled = false;
            removeBtn.textContent = 'remove server';
          }
        }}, 'remove server');

        dzBody.appendChild(removeBtn);
      }

  </script>
</body>
</html>
