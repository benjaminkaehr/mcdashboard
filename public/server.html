<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>server - brotalius dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .collapsible-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .collapsible-header h2 { margin: 0; }
    .collapse-arrow {
      font-size: 0.75rem;
      color: var(--fg-muted, #888);
      transition: transform 0.2s;
    }
    .collapsible-header.collapsed .collapse-arrow { transform: rotate(-90deg); }
    .collapsible-body.collapsed { display: none; }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .player-card {
      border: 1px solid var(--border, #333);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .player-name { font-weight: bold; font-size: 1rem; }
    .player-detail { font-size: 0.85rem; color: var(--fg-muted, #888); font-family: monospace; white-space: pre; }
    .mc-bar { display: flex; gap: 2px; margin-top: 0.3rem; align-items: center; }
    .mc-pip {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .mc-pip.full  { opacity: 1; }
    .mc-pip.half  { opacity: 1; position: relative; overflow: hidden; background: transparent !important; }
    .mc-pip.half::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 50%; height: 100%;
    }
    .mc-pip.empty { opacity: 0.18; }
  </style>
</head>
<body>
  <main id="main"></main>

  <script type="module">
    import { api, renderHeader, renderFooter, el } from '/app.js';

    const params = new URLSearchParams(location.search);
    const name   = params.get('name');
    if (!name) location.href = '/index.html';

    const me = await renderHeader();
    if (!me) throw new Error();
    renderFooter();

    const main = document.getElementById('main');

    const { servers } = await api('/api/servers');
    const server = servers.find(s => s.name === name);
    if (!server) {
      main.appendChild(el('h1', {}, 'no access'));
      main.appendChild(el('p', { class: 'muted' }, 'you do not have permission to view this server.'));
      throw new Error();
    }

    const isOperator = me.is_super || server.role === 'operator';

    main.appendChild(el('h1', {}, server.display_name || server.name));
    main.appendChild(el('p', { class: 'muted' }, [
      el('span', { class: 'dot' + (server.running ? '' : ' offline'), style: 'margin-right:0.5rem;' }),
      server.running ? 'running' : 'stopped',
      '   ·   role: ' + server.role,
    ]));

    const power = el('div', { class: 'row mt-2' }, []);
    if (!server.running) {
      power.appendChild(button('start', 'btn primary', '/api/servers/' + name + '/start'));
    } else if (isOperator) {
      power.appendChild(button('stop',    'btn danger', '/api/servers/' + name + '/stop'));
      power.appendChild(button('restart', 'btn warn',   '/api/servers/' + name + '/restart'));
    }
    main.appendChild(power);

    function button(label, cls, url) {
      return el('button', {
        class: cls,
        onclick: async (e) => {
          if (label !== 'start' && !confirm(label + ' ' + name + '?')) return;
          e.target.disabled = true;
          e.target.textContent = label + '...';
          try {
            await api(url, { method: 'POST' });
            location.reload();
          } catch (err) {
            alert(err.message);
            e.target.disabled = false;
            e.target.textContent = label;
          }
        },
      }, label);
    }

    /* ---- collapsible section helper ---- */
    function collapsible(title, startCollapsed = false) {
      const arrow  = el('span', { class: 'collapse-arrow' }, '▼');
      const header = el('div', { class: 'collapsible-header' + (startCollapsed ? ' collapsed' : '') }, [
        el('h2', {}, title), arrow,
      ]);
      const body = el('div', { class: 'collapsible-body' + (startCollapsed ? ' collapsed' : '') });
      header.addEventListener('click', () => {
        const nowCollapsed = header.classList.toggle('collapsed');
        body.classList.toggle('collapsed', nowCollapsed);
      });
      main.appendChild(el('div', { class: 'mt-2' }, [header, body]));
      return body;
    }

    if (isOperator) {

      /* ---- whitelist ---- */
      const wlBody  = collapsible('whitelist', true);
      const wlInput = el('input', { type: 'text', placeholder: 'minecraft username' });
      const wlOut   = el('div', { class: 'console' });
      wlBody.appendChild(el('div', { class: 'row' }, [
        wlInput,
        el('button', { class: 'btn primary', onclick: () => doWl('add') }, 'add'),
        el('button', { class: 'btn danger',  onclick: () => doWl('remove') }, 'remove'),
        el('button', { class: 'btn', onclick: async () => {
          try {
            const r = await api('/api/servers/' + name + '/whitelist');
            wlOut.textContent = r.result || '(empty)';
          } catch (err) { wlOut.textContent = 'error: ' + err.message; }
        }}, 'list'),
      ]));
      wlBody.appendChild(wlOut);

      async function doWl(action) {
        const username = wlInput.value.trim();
        if (!username) return;
        try {
          const r = await api('/api/servers/' + name + '/whitelist/' + action, {
            method: 'POST', body: { username },
          });
          wlOut.textContent = r.result || '(no output)';
          wlInput.value = '';
        } catch (err) { wlOut.textContent = 'error: ' + err.message; }
      }

      /* ---- console ---- */
      const conBody  = collapsible('console', true);
      conBody.appendChild(el('p', { class: 'muted' }, 'sends a command via RCON. server must be running.'));
      const cmdInput = el('input', { type: 'text', placeholder: 'e.g. say hello' });
      const cmdOut   = el('div', { class: 'console' });
      cmdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCmd(); });
      conBody.appendChild(el('div', { class: 'row' }, [
        cmdInput,
        el('button', { class: 'btn primary', onclick: sendCmd }, 'send'),
      ]));
      conBody.appendChild(cmdOut);

      async function sendCmd() {
        const command = cmdInput.value.trim();
        if (!command) return;
        try {
          const r = await api('/api/servers/' + name + '/console', {
            method: 'POST', body: { command },
          });
          cmdOut.textContent = '> ' + command + '\n' + (r.result || '') + '\n\n' + cmdOut.textContent;
          cmdInput.value = '';
        } catch (err) { cmdOut.textContent = 'error: ' + err.message + '\n\n' + cmdOut.textContent; }
      }

      /* ---- online players ---- */
      const plBody    = collapsible('online players', false);
      const plStatus  = el('p', { class: 'muted' }, server.running ? 'loading...' : 'server is offline.');
      const plGrid    = el('div', { class: 'player-grid' });
      const plRefresh = el('button', { class: 'btn primary', onclick: () => loadPlayers() }, 'refresh');
      plBody.appendChild(el('div', { class: 'row' }, [plRefresh]));
      plBody.appendChild(plStatus);
      plBody.appendChild(plGrid);

      async function rcon(command) {
        const r = await api('/api/servers/' + name + '/console', {
          method: 'POST', body: { command },
        });
        return r.result || '';
      }

      async function loadPlayers() {
        plRefresh.disabled = true;
        plRefresh.textContent = 'loading...';
        plGrid.innerHTML = '';
        plStatus.textContent = '';
        try {
          const listResult = await rcon('list');
          /* "There are 2 of a max of 20 players online: mael, hellmut" */
          const match = listResult.match(/:\s*(.+)$/);
          const names = match && match[1].trim()
            ? match[1].split(',').map(n => n.trim()).filter(Boolean)
            : [];

          if (names.length === 0) {
            plStatus.textContent = 'no players online.';
            return;
          }
          plStatus.textContent = names.length + ' player' + (names.length !== 1 ? 's' : '') + ' online';

          for (const pname of names) {
            const card   = el('div', { class: 'player-card' });
            const detail = el('div', { class: 'player-detail' }, 'fetching...');
            card.appendChild(el('div', { class: 'player-name' }, pname));
            card.appendChild(detail);
            plGrid.appendChild(card);

            try {
              const [posRaw, hpRaw, foodRaw, dimRaw] = await Promise.all([
                rcon('data get entity ' + pname + ' Pos'),
                rcon('data get entity ' + pname + ' Health'),
                rcon('data get entity ' + pname + ' foodLevel'),
                rcon('data get entity ' + pname + ' Dimension'),
              ]);

              const posMatch  = posRaw.match(/\[([-\d.]+)d,\s*([-\d.]+)d,\s*([-\d.]+)d\]/);
              const pos = posMatch
                ? 'x ' + Math.round(posMatch[1]) + '  y ' + Math.round(posMatch[2]) + '  z ' + Math.round(posMatch[3])
                : '—';

              const hpMatch  = hpRaw.match(/([\d.]+)f$/);
              const hp       = hpMatch ? parseFloat(hpMatch[1]) : null;

              const foodMatch = foodRaw.match(/(\d+)$/);
              const food      = foodMatch ? parseInt(foodMatch[1]) : null;

              const dimMatch = dimRaw.match(/"([^"]+)"$/);
              const dim      = dimMatch ? dimMatch[1].replace('minecraft:', '').replace(/_/g, ' ') : '—';

              let text = 'pos:    ' + pos + '\n';
              text    += 'world:  ' + dim;
              detail.textContent = text;

              function makePip(state, color) {
                const pip = el('div', { class: 'mc-pip ' + state });
                pip.style.background = color;
                if (state === 'half') {
                  pip.style.background = 'transparent';
                  pip.style.border = '1px solid ' + color;
                  const half = el('div', {});
                  half.style.cssText = 'position:absolute;left:0;top:0;width:50%;height:100%;background:' + color;
                  pip.appendChild(half);
                } else if (state === 'empty') {
                  pip.style.background = color;
                }
                return pip;
              }

              function makeBar(value, color) {
                const bar = el('div', { class: 'mc-bar' });
                for (let i = 0; i < 10; i++) {
                  const threshold = (i + 1) * 2;
                  let state;
                  if (value >= threshold)          state = 'full';
                  else if (value >= threshold - 1) state = 'half';
                  else                             state = 'empty';
                  bar.appendChild(makePip(state, color));
                }
                return bar;
              }

              if (hp !== null) {
                card.appendChild(el('div', { class: 'player-detail' }, 'health: ' + hp.toFixed(1) + ' / 20'));
                card.appendChild(makeBar(hp, '#e05252'));
              }

              if (food !== null) {
                card.appendChild(el('div', { class: 'player-detail' }, 'food:   ' + food + ' / 20'));
                card.appendChild(makeBar(food, '#c8a030'));
              }
            } catch {
              detail.textContent = 'could not fetch details';
            }
          }
        } catch (err) {
          plStatus.textContent = 'error: ' + err.message;
        } finally {
          plRefresh.disabled = false;
          plRefresh.textContent = 'refresh';
        }
      }

      if (server.running) loadPlayers();

      /* ---- game log (logs/latest.log) ---- */
      const glBody    = collapsible('game log', true);
      glBody.appendChild(el('p', { class: 'muted' }, 'in-game events — joins, chat, deaths, commands. last 200 lines of logs/latest.log.'));
      const glOut     = el('pre', { class: 'console', style: 'max-height: 400px;' }, 'loading...');
      const glRefresh = el('button', { class: 'btn primary', onclick: () => loadGameLog() }, 'refresh');
      glBody.appendChild(el('div', { class: 'row' }, [glRefresh]));
      glBody.appendChild(glOut);

      async function loadGameLog() {
        glRefresh.disabled = true;
        glRefresh.textContent = 'loading...';
        try {
          const r = await api('/api/servers/' + name + '/file?path=' + encodeURIComponent('logs/latest.log'));
          const lines = r.content.split('\n');
          glOut.textContent = lines.slice(-200).join('\n');
          glOut.scrollTop = glOut.scrollHeight;
        } catch (err) {
          glOut.textContent = 'error: ' + err.message;
        } finally {
          glRefresh.disabled = false;
          glRefresh.textContent = 'refresh';
        }
      }
      loadGameLog();

      /* ---- system log (journalctl) ---- */
      const slBody     = collapsible('system log', true);
      slBody.appendChild(el('p', { class: 'muted' }, 'recent output from journalctl. last 200 lines of the systemd unit log.'));
      const slOut      = el('pre', { class: 'console', style: 'max-height: 400px;' }, 'loading...');
      const slRefresh  = el('button', { class: 'btn primary', onclick: () => loadSysLog() }, 'refresh');
      const slDownload = el('a', {
        class: 'btn',
        href: '/api/servers/' + encodeURIComponent(name) + '/logs/download',
      }, 'download full log');
      slBody.appendChild(el('div', { class: 'row' }, [slRefresh, slDownload]));
      slBody.appendChild(slOut);

      async function loadSysLog() {
        slRefresh.disabled = true;
        slRefresh.textContent = 'loading...';
        try {
          const r = await api('/api/servers/' + name + '/logs?lines=200');
          slOut.textContent = r.text || '(no log entries)';
          slOut.scrollTop = slOut.scrollHeight;
        } catch (err) {
          slOut.textContent = 'error: ' + err.message;
        } finally {
          slRefresh.disabled = false;
          slRefresh.textContent = 'refresh';
        }
      }
      loadSysLog();

      /* ---- files ---- */
      const fiBody = collapsible('files', true);
      fiBody.appendChild(el('p', { class: 'muted' }, 'browse and edit text files inside the server folder.'));
      fiBody.appendChild(el('p', {}, el('a', { href: '/files.html?name=' + encodeURIComponent(name) }, 'open file browser →')));
    }
  </script>
</body>
</html>
